name: CI/CD to k3s

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install docker

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
         args: >
           -Dsonar.organization=alagani
           -Dsonar.projectKey=DevOps-1

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/simple-python-app:latest ./app

      - name: Install Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/simple-python-app:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/simple-python-app:latest

      - name: Copy manifests to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "k8s/*"
          target: "/home/${{ secrets.EC2_USER }}/deploy"

      - name: Deploy to EC2 k3s
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            
            if ! command -v k3s >/dev/null 2>&1; then
              echo "K3s not found. Installing K3s..."
              curl -sfL https://get.k3s.io | sh -
            else
              echo "K3s already installed."
            fi
            
            echo "Ensuring K3s service is running..."
            sudo systemctl enable k3s
            sudo systemctl start k3s
            
            echo "Waiting for K3s to be ready..."
            until sudo k3s kubectl get nodes >/dev/null 2>&1; do
              echo "Waiting for Kubernetes API..."
              sleep 5
            done
            
            cd /home/${{ secrets.EC2_USER }}/deploy/k8s
            
            sudo k3s kubectl apply -f deployment.yml
            sudo k3s kubectl apply -f service.yml
            sudo k3s kubectl rollout restart deployment/simple-python-app
